<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wescue Dog Park</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>
</head>
<body>

  <header class="topbar">
    <div class="brand">🐾 Wescue Dog Park</div>
    <div class="stats">
      <span id="dogCount">0</span> dogs playing &middot;
      <span id="petCount">0</span> pets given today
    </div>
  </header>

  <!-- Search + Filter bar -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="parkSearch" placeholder="Search by name or breed…" autocomplete="off">
    </div>

    <div class="filter-wrap" id="filterWrap">
      <button class="filter-btn" id="filterToggle">
        Filters
        <span class="filter-badge" id="filterBadge"></span>
      </button>

      <div class="filter-panel" id="filterPanel">
        <div class="filter-header">
          <strong>Filters</strong>
          <button class="clear-btn" id="clearFilters">Clear all</button>
        </div>

        <div class="filter-group">
          <p class="filter-label">Size</p>
          <label><input type="checkbox" data-filter="size" value="small"> Small 🐶</label>
          <label><input type="checkbox" data-filter="size" value="medium"> Medium 🐕</label>
          <label><input type="checkbox" data-filter="size" value="large"> Large 🦮</label>
          <label><input type="checkbox" data-filter="size" value="xlarge"> XL 🦴</label>
        </div>

        <div class="filter-group">
          <p class="filter-label">Energy</p>
          <label><input type="checkbox" data-filter="energy" value="low"> Calm 😴</label>
          <label><input type="checkbox" data-filter="energy" value="moderate"> Moderate 🚶</label>
          <label><input type="checkbox" data-filter="energy" value="high"> Active 🏃</label>
        </div>

        <div class="filter-group">
          <p class="filter-label">Good With</p>
          <label><input type="checkbox" data-filter="goodWith" value="kids"> Kids 👶</label>
          <label><input type="checkbox" data-filter="goodWith" value="dogs"> Other Dogs 🐕</label>
          <label><input type="checkbox" data-filter="goodWith" value="cats"> Cats 🐱</label>
        </div>
      </div>
    </div>
  </div>

  <main class="park" id="park">
    <canvas id="parkCanvas"></canvas>
  </main>

  <p class="hint">Click any dog to see their profile. Use filters to find your perfect match.</p>

  <!-- Dog profile modal with carousel navigation -->
  <div class="modal-overlay" id="dogModalOverlay">
    <button class="modal-nav-btn" id="modalPrev" aria-label="Previous dog">&#8592;</button>

    <div class="modal dog-card">
      <button class="close-btn" data-close>&times;</button>

      <div class="dog-card-photo" id="cardPhoto"></div>
      <div class="dog-card-avatar" id="cardAvatar"></div>

      <div class="dog-card-body">
        <p class="dog-card-counter" id="cardCounter"></p>
        <h2 id="cardName"></h2>
        <p class="dog-card-meta" id="cardMeta"></p>
        <p class="dog-card-bio" id="cardBio"></p>
        <p class="dog-card-shelter">📍 <span id="cardShelter"></span></p>
        <div class="dog-card-actions">
          <button class="secondary-btn" id="petBtn">🖐️ Pet</button>
          <a class="primary-btn adopt-btn" id="cardAdoptLink" target="_top" rel="noopener">🏡 Meet on Wescue</a>
        </div>
      </div>
    </div>

    <button class="modal-nav-btn" id="modalNext" aria-label="Next dog">&#8594;</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
